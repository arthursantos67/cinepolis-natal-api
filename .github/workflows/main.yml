name: Main CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Validate Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI .env
        run: |
          cat << 'EOF' > .env
          SECRET_KEY=ci-secret-key
          DEBUG=False
          ALLOWED_HOSTS=127.0.0.1,localhost,backend
          POSTGRES_DB=cinepolis_natal
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_HOST=db
          POSTGRES_PORT=5432
          REDIS_URL=redis://redis:6379/1
          CELERY_BROKER_URL=redis://redis:6379/1
          THROTTLE_ANON_RATE=60/minute
          THROTTLE_USER_RATE=120/minute
          THROTTLE_LOGIN_RATE=5/minute
          THROTTLE_RESERVATION_RATE=10/minute
          NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
          EOF

      - name: Start backend dependencies
        run: docker compose up -d db redis

      - name: Build backend image
        run: docker compose build backend

      - name: Run Django system check
        run: docker compose run --rm backend python manage.py check

      - name: Run database migrations
        run: docker compose run --rm backend python manage.py migrate --noinput

      - name: Run test suite
        run: docker compose run --rm backend pytest -q

      - name: Stop backend dependencies
        if: always()
        run: docker compose down --volumes --remove-orphans

  frontend:
    name: Validate Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  docker-build:
    name: Validate Docker Builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create temporary .env for compose validation
        run: |
          cat << 'EOF' > .env
          SECRET_KEY=ci-secret-key
          DEBUG=False
          POSTGRES_DB=cinepolis_natal
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_HOST=db
          POSTGRES_PORT=5432
          REDIS_URL=redis://redis:6379/1
          CELERY_BROKER_URL=redis://redis:6379/1
          NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
          EOF

      - name: Validate Docker Compose configuration
        run: docker compose -f docker-compose.yml config

      - name: Build backend image
        run: docker build -t cinepolis-natal-backend:ci backend

      - name: Build frontend image
        run: docker build -t cinepolis-natal-frontend:ci frontend
