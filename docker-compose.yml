services:
  web:
    build: .
    container_name: cinepolis_natal_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - .env

  db:
    image: postgres:17
    container_name: cinepolis_natal_db
    environment:
      POSTGRES_DB: cinepolis_natal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cinepolis_natal_redis
    ports:
      - "6379:6379"

  celery:
    build: .
    container_name: cinepolis_natal_celery
    command: celery -A cinepolis_natal_api worker -l info
    volumes:
      - .:/app
    depends_on:
      - redis
      - db
    env_file:
      - .env

volumes:
  postgres_data:

